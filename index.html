<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta
      name="description"
      content="Voxel Realms is a mobile-first voxel platforming expedition through unstable, stacked worlds."
    />
    <meta name="theme-color" content="#07090d" />
    <title>Voxel Realms</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: #07090d;
        color: #f7f3df;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        overflow: hidden;
        padding-top: env(safe-area-inset-top);
        padding-right: env(safe-area-inset-right);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
      }
      #noscript-banner {
        position: fixed;
        inset: 0;
        z-index: 10000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        padding: 2rem;
        background: #07090d;
        color: #f7f3df;
        text-align: center;
      }
      #noscript-banner h1 {
        font-size: 1.2rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        font-weight: 800;
        margin: 0;
      }
      #noscript-banner p {
        max-width: 32rem;
        line-height: 1.5;
        color: #aab9bd;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <noscript>
      <div id="noscript-banner">
        <h1>Voxel Realms</h1>
        <p>
          This expedition needs JavaScript to render the realms. Enable JavaScript
          and reload to continue.
        </p>
      </div>
    </noscript>
    <canvas
      id="scene-canvas"
      style="position: fixed; inset: 0; width: 100vw; height: 100vh; display: block; touch-action: none;"
    ></canvas>
    <div id="root"></div>
    <script type="module" src="/app/main.tsx"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta
      name="description"
      content="Voxel Realms is a mobile-first voxel platforming expedition through unstable, stacked worlds."
    />
    <meta name="theme-color" content="#07090d" />
    <title>Voxel Realms</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: #07090d;
        color: #f7f3df;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        overflow: hidden;
        padding-top: env(safe-area-inset-top);
        padding-right: env(safe-area-inset-right);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
      }
      #noscript-banner {
        position: fixed;
        inset: 0;
        z-index: 10000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        padding: 2rem;
        background: #07090d;
        color: #f7f3df;
        text-align: center;
      }
      #noscript-banner h1 {
        font-size: 1.2rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        font-weight: 800;
        margin: 0;
      }
      #noscript-banner p {
        max-width: 32rem;
        line-height: 1.5;
        color: #aab9bd;
        margin: 0;
      }
      #boot-splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.4rem;
        background: radial-gradient(ellipse at center, #0c1420 0%, #07090d 70%);
        z-index: 9999;
        transition: opacity 380ms ease-out;
      }
      #boot-splash[data-hidden="true"] {
        opacity: 0;
        pointer-events: none;
      }
      #boot-splash .brand-mark {
        display: grid;
        grid-template-columns: repeat(3, 18px);
        grid-template-rows: repeat(3, 18px);
        gap: 4px;
        animation: boot-pulse 1400ms ease-in-out infinite;
      }
      #boot-splash .brand-mark span {
        display: block;
        width: 18px;
        height: 18px;
        border-radius: 2px;
        background: #41dce8;
        opacity: 0.22;
      }
      #boot-splash .brand-mark span:nth-child(1) {
        background: #bcff5c;
        opacity: 0.95;
      }
      #boot-splash .brand-mark span:nth-child(5) {
        background: #ffc44d;
        opacity: 0.95;
      }
      #boot-splash .brand-mark span:nth-child(9) {
        background: #ff6f59;
        opacity: 0.95;
      }
      #boot-splash .wordmark {
        font-size: 14px;
        letter-spacing: 0.4em;
        text-transform: uppercase;
        font-weight: 800;
        color: #aab9bd;
      }
      @keyframes boot-pulse {
        0%,
        100% {
          transform: scale(1);
          filter: brightness(1);
        }
        50% {
          transform: scale(1.06);
          filter: brightness(1.3);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        #boot-splash .brand-mark {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="boot-splash" role="status" aria-label="Voxel Realms loading">
      <div class="brand-mark" aria-hidden="true">
        <span></span><span></span><span></span>
        <span></span><span></span><span></span>
        <span></span><span></span><span></span>
      </div>
      <div class="wordmark">Voxel Realms</div>
    </div>
    <noscript>
      <div id="noscript-banner">
        <h1>Voxel Realms</h1>
        <p>
          This expedition needs JavaScript to render the realms. Enable JavaScript
          and reload to continue.
        </p>
      </div>
    </noscript>
    <div id="root"></div>
    <script type="module" src="/app/main.tsx"></script>
  </body>
</html>

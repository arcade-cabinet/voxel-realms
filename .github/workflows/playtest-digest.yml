name: Playtest digest

on:
  schedule:
    # Every Monday at 13:07 UTC — off the minute to avoid the thundering herd.
    - cron: "7 13 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Collate feedback issues from the last 7 days
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v8.0.0
        with:
          script: |
            const since = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000).toISOString();
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: "feedback",
              state: "all",
              since,
              per_page: 100,
            });

            const recent = issues.filter((issue) => !issue.pull_request);
            if (recent.length === 0) {
              core.info("No feedback issues in the last 7 days — skipping digest.");
              return;
            }

            const openItems = recent.filter((issue) => issue.state === "open");
            const closedItems = recent.filter((issue) => issue.state === "closed");

            const escapeMarkdown = (value) =>
              String(value ?? "")
                .replace(/[\r\n]+/g, " ")
                .replace(/([\\`*_{}\[\]()#+\-!|])/g, "\\$1")
                .slice(0, 200);

            const formatLine = (issue) =>
              `- #${issue.number} (${issue.state}) — ${escapeMarkdown(issue.title)} · ${escapeMarkdown(issue.user.login)}`;

            const body = [
              `**Window**: ${since.slice(0, 10)} → ${new Date().toISOString().slice(0, 10)}`,
              "",
              `**Open feedback (${openItems.length})**:`,
              ...(openItems.length ? openItems.map(formatLine) : ["- _none_"]),
              "",
              `**Closed feedback (${closedItems.length})**:`,
              ...(closedItems.length ? closedItems.map(formatLine) : ["- _none_"]),
              "",
              "_Auto-generated by `.github/workflows/playtest-digest.yml`. Close this issue once triaged._",
            ].join("\n");

            const title = `Playtest digest · ${new Date().toISOString().slice(0, 10)}`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ["playtest-digest"],
            });

            core.info(`Created digest issue for ${recent.length} feedback item(s).`);

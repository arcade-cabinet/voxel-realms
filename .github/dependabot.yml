version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
    open-pull-requests-limit: 10
    # Pin sql.js — 1.14.1 breaks jeep-sqlite@2.8.0 WASM ABI (LinkError).
    # Revisit when jeep-sqlite publishes a version compatible with a newer sql.js.
    ignore:
      - dependency-name: "sql.js"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns:
          - "*"

  - package-ecosystem: gradle
    directory: /android
    schedule:
      interval: weekly
    groups:
      android-minor-and-patch:
        update-types:
          - minor
          - patch
    open-pull-requests-limit: 5
